<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa de capturas</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f4f6fb;color:#1f2937}
    .wrap{max-width:1200px;margin:0 auto;padding:20px}
    .card{background:#fff;border:1px solid #dbe2ea;border-radius:18px;padding:20px;box-shadow:0 12px 40px rgba(17,24,39,.08)}
    h1{margin:0 0 8px;font-size:30px}
    .sub{margin:0 0 16px;color:#475569}
    .toolbar{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px}
    .stat{background:#eef2ff;border:1px solid #c7d2fe;border-radius:12px;padding:12px 14px;font-weight:700}
    #map{height:70vh;border-radius:14px;border:1px solid #dbe2ea}
    .status{margin-top:12px;padding:12px 14px;border-radius:12px;background:#fffbeb;border:1px solid #fde68a;color:#b45309;display:none}
    .status.show{display:block}
    a{color:#1d4ed8}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Mapa de capturas</h1>
      <p class="sub">Visualización de pines a partir de los registros guardados.</p>
      <div class="toolbar">
        <div class="stat">Total de capturas: <span id="total">0</span></div>
      </div>
      <div id="map"></div>
      <div id="status" class="status"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyKjipbc58UR1MYlKftu2QnqDTDKnL0Rwey2mmmXCp_cIFgt-jiMnA6Ks8qPOvzC01Q/exec?action=map';
    const totalEl = document.getElementById('total');
    const statusEl = document.getElementById('status');

    const map = L.map('map').setView([32.6245, -115.4523], 11);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    function showStatus(msg) {
      statusEl.textContent = msg;
      statusEl.classList.add('show');
    }

    async function cargarPuntos() {
      try {
        const response = await fetch(API_URL);
        const data = await response.json();

        if (!data.ok) throw new Error(data.message || 'No fue posible cargar las capturas.');

        const puntos = Array.isArray(data.data) ? data.data : [];
        totalEl.textContent = puntos.length;

        if (!puntos.length) {
          showStatus('No hay capturas con coordenadas válidas todavía.');
          return;
        }

        const bounds = [];

        puntos.forEach(p => {
          const lat = Number(p.latitud);
          const lng = Number(p.longitud);
          if (Number.isNaN(lat) || Number.isNaN(lng)) return;

          bounds.push([lat, lng]);

          const popup = `
            <div style="min-width:220px">
              <strong>${p.ubicacion || 'Sin domicilio'}</strong><br>
              <b>Referencia:</b> ${p.referencia || 'Sin referencia'}<br>
              <b>Fecha y hora:</b> ${p.fechaHora || 'Sin dato'}<br>
              <b>Latitud:</b> ${p.latitud}<br>
              <b>Longitud:</b> ${p.longitud}<br>
              <b>Precisión:</b> ${p.precision || 'Sin dato'}<br>
              ${p.googleMaps ? `<a href="${p.googleMaps}" target="_blank" rel="noopener noreferrer">Abrir en Google Maps</a>` : ''}
            </div>
          `;

          L.marker([lat, lng]).addTo(map).bindPopup(popup);
        });

        if (bounds.length) {
          map.fitBounds(bounds, {padding: [30, 30]});
        }
      } catch (error) {
        showStatus(error.message || 'No fue posible cargar el mapa.');
      }
    }

    cargarPuntos();
  </script>
</body>
</html>
