<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa de capturas</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:#f4f6fb;
      color:#1f2937;
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:20px;
    }

    .card{
      background:#fff;
      border:1px solid #dbe2ea;
      border-radius:18px;
      padding:20px;
      box-shadow:0 12px 40px rgba(17,24,39,.08);
    }

    h1{
      margin:0 0 8px;
      font-size:30px;
    }

    .sub{
      margin:0 0 16px;
      color:#475569;
    }

    .toolbar{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .stat{
      background:#eef2ff;
      border:1px solid #c7d2fe;
      border-radius:12px;
      padding:12px 14px;
      font-weight:700;
    }

    .stat.lonas{
      background:#ecfdf5;
      border:1px solid #a7f3d0;
      color:#065f46;
    }

    #map{
      height:70vh;
      border-radius:14px;
      border:1px solid #dbe2ea;
    }

    .status{
      margin-top:12px;
      padding:12px 14px;
      border-radius:12px;
      background:#fffbeb;
      border:1px solid #fde68a;
      color:#b45309;
      display:none;
    }

    .status.show{
      display:block;
    }

    a{
      color:#1d4ed8;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1>Mapa de capturas</h1>
      <p class="sub">Visualización de pines a partir de los registros guardados.</p>

      <div class="toolbar">
        <div class="stat">
          Total de capturas: <span id="total">0</span>
        </div>

        <div class="stat lonas">
          Total de L: <span id="total lonas">0</span>
        </div>
      </div>

      <div id="map"></div>
      <div id="status" class="status"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyKjipbc58UR1MYlKftu2QnqDTDKnL0Rwey2mmmXCp_cIFgt-jiMnA6Ks8qPOvzC01Q/exec?action=map';

    const totalEl = document.getElementById('total');
    const totalLonasEl = document.getElementById('totalLonas');
    const statusEl = document.getElementById('status');

    const map = L.map('map').setView([32.6245, -115.4523], 11);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    function showStatus(msg) {
      statusEl.textContent = msg;
      statusEl.classList.add('show');
    }

    function limpiarNumero(valor) {
      if (valor === null || valor === undefined || valor === '') return 0;

      const texto = String(valor)
        .trim()
        .replace(/,/g, '');

      const numeroEncontrado = texto.match(/-?\d+(\.\d+)?/);

      if (!numeroEncontrado) return 0;

      const numero = Number(numeroEncontrado[0]);

      return Number.isNaN(numero) ? 0 : numero;
    }

    function obtenerTotalLonas(p) {
      return limpiarNumero(
        p['Referencia adicional'] ??
        p.referenciaAdicional ??
        p.referencia_adicional ??
        p.referencia ??
        0
      );
    }

    async function cargarPuntos() {
      try {
        const response = await fetch(API_URL);
        const data = await response.json();

        if (!data.ok) {
          throw new Error(data.message || 'No fue posible cargar las capturas.');
        }

        const puntos = Array.isArray(data.data) ? data.data : [];

        totalEl.textContent = puntos.length;

        const sumaTotalLonas = puntos.reduce((suma, p) => {
          return suma + obtenerTotalLonas(p);
        }, 0);

        totalLonasEl.textContent = sumaTotalLonas.toLocaleString('es-MX');

        if (!puntos.length) {
          showStatus('No hay capturas con coordenadas válidas todavía.');
          return;
        }

        const bounds = [];

        puntos.forEach(p => {
          const lat = Number(p.latitud ?? p['Latitud']);
          const lng = Number(p.longitud ?? p['Longitud']);

          if (Number.isNaN(lat) || Number.isNaN(lng)) return;

          bounds.push([lat, lng]);

          const totalLonas = obtenerTotalLonas(p);

          const domicilio =
            p.ubicacion ??
            p['Domicilio detectado'] ??
            'Sin domicilio';

          const fechaHora =
            p.fechaHora ??
            p['Fecha y hora dispositivo'] ??
            p['Timestamp Apps Script'] ??
            'Sin dato';

          const precision =
            p.precision ??
            p['Precisión estimada (m)'] ??
            'Sin dato';

          const googleMaps =
            p.googleMaps ??
            p['Google Maps'] ??
            '';

          const capturadoDesde =
            p.capturadoDesde ??
            p['Capturado desde'] ??
            'Sin dato';

          const popup = `
            <div style="min-width:220px">
              <strong>${domicilio}</strong><br>
              <b>Total de lonas:</b> ${totalLonas}<br>
              <b>Fecha y hora:</b> ${fechaHora}<br>
              <b>Latitud:</b> ${lat}<br>
              <b>Longitud:</b> ${lng}<br>
              <b>Precisión:</b> ${precision}<br>
              <b>Capturado desde:</b> ${capturadoDesde}<br>
              ${googleMaps ? `<a href="${googleMaps}" target="_blank" rel="noopener noreferrer">Abrir en Google Maps</a>` : ''}
            </div>
          `;

          L.marker([lat, lng]).addTo(map).bindPopup(popup);
        });

        if (bounds.length) {
          map.fitBounds(bounds, {padding: [30, 30]});
        }

      } catch (error) {
        showStatus(error.message || 'No fue posible cargar el mapa.');
      }
    }

    cargarPuntos();
  </script>
</body>
</html>
